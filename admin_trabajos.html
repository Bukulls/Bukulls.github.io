<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajos - Panel de Administración</title>
<link rel="stylesheet" href="style.css">
<style>
/* Estilos básicos del admin (similares a los otros admin_*.html) */
body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin:0; padding:0; }
.admin-container { display: flex; min-height: 100vh; }
.admin-menu { background-color: #222; color: #fff; width: 220px; flex-shrink: 0; padding: 20px; }
.admin-menu h3 { margin-bottom: 15px; }
.admin-menu ul { list-style: none; padding: 0; }
.admin-menu li { margin: 10px 0; }
.admin-menu a { color: #fff; text-decoration: none; font-weight: bold; display: block; padding: 8px 0; }
.admin-menu a:hover, .admin-menu a.active { color: #ad0000; }
.admin-content { flex: 1; padding: 20px; }

label { display: block; margin-top: 10px; margin-bottom: 5px; color: #ccc; }
input[type="text"], input[type="file"], textarea, select {
    width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; border-radius: 4px;
    border: 1px solid #555; background-color: #333; color: #fff; box-sizing: border-box;
}
input[type="file"]{ color: #ccc; }

button, .btn-action {
    background-color: #ad0000; color: white; padding: 8px 12px; border: none;
    border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; margin-right: 5px;
}
button:hover, .btn-action:hover { background-color: #ff0000; }

#lista-trabajos .trabajo-item { 
    background-color: #1e1e1e; border: 1px solid #383838; padding: 15px; 
    margin-bottom: 15px; border-radius: 5px; 
}
#lista-trabajos h5 { margin-top:0; }
#lista-trabajos .estado-pendiente h5 { color: #ffc107; } 
#lista-trabajos .estado-en-proceso h5 { color: #17a2b8; } 
#lista-trabajos .estado-completado h5 { color: #28a745; } 
#lista-trabajos .estado-cancelado h5 { color: #dc3545; } 

header { background-color: #000; color: #ad0000; padding: 20px; text-align: center; }
footer { background-color: #000; color: #ad0000; text-align: center; padding: 15px; border-top: 1px solid #333;}

.filtros-trabajos, .novedad-form-container {
    background-color: #2a2a2a; padding: 15px; margin-bottom: 20px; border-radius: 5px;
}
.novedades-lista { margin-top: 15px; padding-left: 20px; border-top: 1px dashed #444; padding-top:10px;}
.novedad-item { margin-bottom: 15px; padding-bottom:10px; border-bottom: 1px dotted #333;}
.novedad-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom:0;}
.novedad-item img { max-width: 150px; max-height: 150px; border-radius: 3px; margin-top: 5px; display:block; }
.novedad-item p { margin: 5px 0; }

.progress-bar-container {
    width: 100%; background-color: #555; border-radius: 4px; margin-top: 5px; height: 10px; display: none;
}
.progress-bar {
    width: 0%; height: 100%; background-color: #4CAF50; border-radius: 4px;
    text-align: center; line-height: 10px; color: white; font-size: 0.7em;
}
</style>
</head>
<body>

<header>
  <h1 style="color:#ad0000;">Panel de Administración</h1>
</header>

<div class="admin-container">
  <aside class="admin-menu">
    <h3>Menú</h3>
    <ul>
      <li><a href="admin_vehiculos.html">Vehículos</a></li> 
      <li><a href="admin_presupuestos.html">Presupuestos</a></li>
      <li><a href="admin_trabajos.html" class="active">Trabajos</a></li>
      <li><a href="admin_manuales.html">Manuales</a></li>
      <li><a href="index.html">Volver a Inicio</a></li>
    </ul>
  </aside>

  <main class="admin-content">
    <section id="trabajos-section"> 
      <h2>Gestión de Trabajos</h2>
      <p>Aquí puedes ver los trabajos aceptados y actualizar su estado y progreso.</p>
      
      <div class="filtros-trabajos">
          <label for="filtro-estado-trabajo">Filtrar por Estado:</label>
          <select id="filtro-estado-trabajo">
              <option value="todos">Todos los Estados</option>
              <option value="Pendiente">Pendiente</option>
              <option value="En Proceso">En Proceso</option>
              <option value="Completado">Completado</option>
              <option value="Cancelado">Cancelado</option>
          </select>
      </div>
      
       <div id="lista-trabajos">
           <p>Cargando trabajos...</p>
       </div>
    </section>
  </main>
</div>

<footer>
  <p>&copy; 2025 Taller Automotriz EDC. Todos los derechos reservados.</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/11.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.0/firebase-storage-compat.js"></script>
<script src="script.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof db === 'undefined' || typeof storage === 'undefined') {
    console.error("Firebase (db y storage) no están inicializados.");
    alert("Error crítico: No se pudo conectar a los servicios de Firebase.");
    return;
  }

  const listaTrabajosDiv = document.getElementById('lista-trabajos');
  const filtroEstadoTrabajoSelect = document.getElementById('filtro-estado-trabajo');

  async function mostrarTrabajos(filtroEstado = "todos") {
      if (!listaTrabajosDiv) return;
      listaTrabajosDiv.innerHTML = '<p>Cargando trabajos...</p>';
      
      let query = db.collection("trabajos_en_curso");
      if (filtroEstado !== "todos") {
          query = query.where("estadoTrabajo", "==", filtroEstado);
      }
      query = query.orderBy("fechaInicioTrabajo", "desc");

      query.onSnapshot(snapshot => {
          if (snapshot.empty) {
              listaTrabajosDiv.innerHTML = `<p>No hay trabajos ${filtroEstado !== "todos" ? `con estado '${filtroEstado}'` : ''} registrados.</p>`; 
              return;
          }
          let trabajosHTML = "";
          snapshot.forEach(doc => {
              const t = doc.data(); 
              const id = doc.id; 

              let manoDeObraTrabajoHTML = '';
              if (t.manoDeObra && t.manoDeObra.monto > 0) {
                  manoDeObraTrabajoHTML = `<li style="color: #ffc107;">Mano de Obra (${t.manoDeObra.descripcion || 'General'}): $${t.manoDeObra.monto.toFixed(2)}</li>`;
              }
              
              let claseEstado = `estado-${(t.estadoTrabajo || 'pendiente').toLowerCase().replace(/\s+/g, '-')}`;
              
              let novedadesHTML = '<div class="novedades-lista"><h6>Novedades del Trabajo:</h6>';
              if (t.novedades && t.novedades.length > 0) {
                  t.novedades.slice().reverse().forEach(nov => { // Mostrar las más recientes primero
                      novedadesHTML += `
                          <div class="novedad-item">
                              <p><strong>Descripción:</strong> ${nov.descripcion || 'N/A'}</p>
                              ${nov.imageUrl ? `<img src="${nov.imageUrl}" alt="Imagen novedad">` : ''}
                              <p style="font-size:0.8em; color:#888;">Fecha: ${nov.fecha ? new Date(nov.fecha.seconds * 1000).toLocaleString() : 'N/A'}</p>
                          </div>`;
                  });
              } else {
                  novedadesHTML += '<p>No hay novedades registradas para este trabajo.</p>';
              }
              novedadesHTML += '</div>';

              let formNovedadHTML = '';
              if (t.estadoTrabajo === 'En Proceso') {
                  formNovedadHTML = `
                    <div class="novedad-form-container" style="margin-top:15px;">
                        <h6 style="color:#17a2b8; margin-top:0;">Agregar Novedad al Trabajo</h6>
                        <form class="form-agregar-novedad" data-trabajo-id="${id}">
                            <label for="novedad-descripcion-${id}">Descripción de la Novedad:</label>
                            <textarea id="novedad-descripcion-${id}" rows="2" required></textarea>
                            <label for="novedad-imagen-${id}">Imagen (Opcional):</label>
                            <input type="file" id="novedad-imagen-${id}" accept="image/*">
                            <div class="progress-bar-container" id="novedad-progress-container-${id}">
                                <div class="progress-bar" id="novedad-progress-bar-${id}"></div>
                            </div>
                            <button type="submit" class="btn-action" style="background-color:#17a2b8;">Agregar Novedad</button>
                        </form>
                    </div>`;
              }

              trabajosHTML += `
                  <div class="trabajo-item ${claseEstado}">
                      <h5>Trabajo: ${t.vehiculoInfo || 'N/A'} (ID: ${id.substring(0,8)})</h5>
                      <p><strong>Cliente:</strong> ${t.clienteNombre || 'N/A'} ${t.clienteTelefono ? `- Tel: ${t.clienteTelefono}`: ''}</p>
                      <p><strong>Monto Total Presupuestado:</strong> <span style="font-weight:bold; color: #4CAF50;">$${t.total ? t.total.toFixed(2) : '0.00'}</span></p>
                      <p><strong>Estado Actual:</strong> <span style="font-weight:bold;">${t.estadoTrabajo || 'Pendiente'}</span></p>
                      <p><strong>ID Presupuesto Original:</strong> ${t.presupuestoOriginalId || 'N/A'}</p>
                      <p><strong>Items del Presupuesto:</strong></p>
                      <ul style="padding-left: 20px; margin-bottom: 10px;">
                          ${t.items && t.items.length > 0 ? t.items.map(item => `<li>${item.repuesto}: $${item.monto ? item.monto.toFixed(2) : '0.00'}</li>`).join('') : '<li>No hay items detallados.</li>'}
                          ${manoDeObraTrabajoHTML}
                      </ul>
                      <p style="font-size: 0.8em; color: #888;">Presup. Aceptado: ${t.fechaAceptacionPresupuesto ? new Date(t.fechaAceptacionPresupuesto.seconds * 1000).toLocaleDateString() : 'N/A'}</p>
                      <p style="font-size: 0.8em; color: #888;">Trabajo Iniciado: ${t.fechaInicioTrabajo ? new Date(t.fechaInicioTrabajo.seconds * 1000).toLocaleDateString() : 'N/A'}</p>
                      ${t.fechaCompletado ? `<p style="font-size: 0.8em; color: #28a745;">Completado el: ${new Date(t.fechaCompletado.seconds * 1000).toLocaleString()}</p>` : ''}
                      ${t.fechaCancelado ? `<p style="font-size: 0.8em; color: #dc3545;">Cancelado el: ${new Date(t.fechaCancelado.seconds * 1000).toLocaleString()}</p>` : ''}
                      
                      ${novedadesHTML}
                      ${formNovedadHTML}

                      <div style="margin-top: 15px; border-top:1px solid #444; padding-top:10px;">
                          <label for="estado-trabajo-${id}" style="display:inline-block; margin-right:5px;">Cambiar Estado del Trabajo:</label>
                          <select id="estado-trabajo-${id}" data-trabajo-id="${id}" class="cambiar-estado-trabajo-select">
                              <option value="Pendiente" ${t.estadoTrabajo === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                              <option value="En Proceso" ${t.estadoTrabajo === 'En Proceso' ? 'selected' : ''}>En Proceso</option>
                              <option value="Completado" ${t.estadoTrabajo === 'Completado' ? 'selected' : ''}>Completado</option>
                              <option value="Cancelado" ${t.estadoTrabajo === 'Cancelado' ? 'selected' : ''}>Cancelado</option>
                          </select>
                          <button class="btn-action confirmar-cambio-estado" data-trabajo-id="${id}" style="background-color:#007bff; margin-left:10px;">Confirmar Cambio de Estado</button>
                      </div>
                  </div>`;
          });
          listaTrabajosDiv.innerHTML = trabajosHTML;

          // Event Listeners para los formularios de agregar novedad
          listaTrabajosDiv.querySelectorAll('.form-agregar-novedad').forEach(form => {
              form.addEventListener('submit', async (e) => {
                  e.preventDefault();
                  const trabajoId = e.target.dataset.trabajoId;
                  const descripcionNovedad = document.getElementById(`novedad-descripcion-${trabajoId}`).value;
                  const imagenFile = document.getElementById(`novedad-imagen-${trabajoId}`).files[0];
                  
                  if (!descripcionNovedad && !imagenFile) {
                      alert("Debes añadir una descripción o una imagen para la novedad.");
                      return;
                  }
                  await agregarNovedadAlTrabajo(trabajoId, imagenFile, descripcionNovedad, e.target);
              });
          });
          
          listaTrabajosDiv.querySelectorAll('.confirmar-cambio-estado').forEach(button => {
              button.addEventListener('click', async (e) => { /* ... (lógica sin cambios) ... */ });
          });
          
          listaTrabajosDiv.querySelectorAll('.cambiar-estado-trabajo-select').forEach(select => {
              select.addEventListener('focus', function () { this.previousValue = this.value; });
              select.addEventListener('change', async (e) => { /* ... (lógica sin cambios) ... */ });
          });

      }, error => { /* ... (manejo de error) ... */ });
  }

  async function agregarNovedadAlTrabajo(trabajoId, imagenFile, descripcionNovedad, formElement) {
      const submitButton = formElement.querySelector('button[type="submit"]');
      const progressContainer = document.getElementById(`novedad-progress-container-${trabajoId}`);
      const progressBar = document.getElementById(`novedad-progress-bar-${trabajoId}`);

      submitButton.disabled = true;
      submitButton.textContent = 'Agregando...';

      let imageUrl = null;
      try {
          if (imagenFile) {
              if (progressContainer) progressContainer.style.display = 'block';
              if (progressBar) progressBar.style.width = '0%';

              const imageName = `${Date.now()}_${imagenFile.name.replace(/\s+/g, '_')}`;
              const storagePath = `trabajos_novedades/${trabajoId}/${imageName}`;
              const imageRef = storage.ref().child(storagePath);
              const uploadTask = imageRef.put(imagenFile);

              await new Promise((resolve, reject) => {
                  uploadTask.on('state_changed',
                      (snapshot) => {
                          const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                          if (progressBar) progressBar.style.width = progress + '%';
                          if (progressBar) progressBar.textContent = Math.round(progress) + '%';
                      },
                      (error) => {
                          console.error("Error subiendo imagen de novedad:", error);
                          reject(error);
                      },
                      async () => {
                          imageUrl = await uploadTask.snapshot.ref.getDownloadURL();
                          resolve();
                      }
                  );
              });
          }

          const nuevaNovedad = {
              descripcion: descripcionNovedad || (imageUrl ? "Imagen adjunta" : "Actualización"),
              imageUrl: imageUrl, // Será null si no se subió imagen
              fecha: firebase.firestore.FieldValue.serverTimestamp()
          };

          const trabajoRef = db.collection("trabajos_en_curso").doc(trabajoId);
          await trabajoRef.update({
              novedades: firebase.firestore.FieldValue.arrayUnion(nuevaNovedad)
          });

          alert("Novedad agregada con éxito.");
          formElement.reset(); // Limpiar el formulario específico de la novedad
          if (progressContainer) progressContainer.style.display = 'none';

          // onSnapshot debería actualizar la lista automáticamente, por lo que no se necesita llamar a mostrarTrabajos()
      } catch (error) {
          console.error("Error al agregar novedad:", error);
          alert("Error al agregar la novedad: " + error.message);
      } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Agregar Novedad';
      }
  }

  async function actualizarEstadoTrabajo(trabajoId, nuevoEstado) { /* ... (código sin cambios de la respuesta anterior) ... */ }


  // Event Listener para el filtro de estado
  if (filtroEstadoTrabajoSelect) {
      filtroEstadoTrabajoSelect.addEventListener('change', (e) => {
          mostrarTrabajos(e.target.value);
      });
  }

  // Carga Inicial
  if (typeof mostrarTrabajos === "function") {
    mostrarTrabajos(); 
  }
  // --- COPIAR LAS DEFINICIONES COMPLETAS DE actualizarEstadoTrabajo DESDE LA RESPUESTA ANTERIOR AQUÍ ---
  // async function actualizarEstadoTrabajo(trabajoId, nuevoEstado) { ... }
  async function actualizarEstadoTrabajo(trabajoId, nuevoEstado) {
      if (!trabajoId || !nuevoEstado) {
          alert("Faltan datos para actualizar el estado del trabajo.");
          return;
      }
      
      const confirmMsg = (nuevoEstado === "Completado" || nuevoEstado === "Cancelado") ? 
          `¿Estás seguro de cambiar el estado a "${nuevoEstado}"? Esta acción podría ser final.` :
          `¿Cambiar estado a "${nuevoEstado}"?`;
      
      // No necesitamos pedir confirmación aquí si el botón de "Confirmar Cambio" ya lo hizo
      // O si es un cambio que no la requiere (ej. Pendiente -> En Proceso)
      // La lógica del event listener del select y del botón de confirmar ya maneja esto.

      console.log(`Actualizando trabajo ${trabajoId} a estado: ${nuevoEstado}`);
      try {
          const trabajoRef = db.collection("trabajos_en_curso").doc(trabajoId);
          let datosActualizar = { estadoTrabajo: nuevoEstado };
          
          // Solo borrar fechas si el estado *NO* es el correspondiente a esa fecha
          if (nuevoEstado !== 'Completado') {
              datosActualizar.fechaCompletado = firebase.firestore.FieldValue.delete();
          }
          if (nuevoEstado !== 'Cancelado') {
              datosActualizar.fechaCancelado = firebase.firestore.FieldValue.delete();
          }

          if (nuevoEstado === 'Completado') {
              datosActualizar.fechaCompletado = firebase.firestore.FieldValue.serverTimestamp();
          } else if (nuevoEstado === 'Cancelado') {
              datosActualizar.fechaCancelado = firebase.firestore.FieldValue.serverTimestamp();
          }

          await trabajoRef.update(datosActualizar);
          // alert(`Estado del trabajo ID ${trabajoId.substring(0,8)} actualizado a: ${nuevoEstado}`); 
          // El alert es opcional, ya que onSnapshot refrescará la UI.
      } catch (error) {
          console.error("Error al actualizar estado del trabajo:", error);
          alert("Error al actualizar el estado: " + error.message);
          // Si falla, intentar revertir el select visualmente (más complejo, requiere guardar estado previo)
      }
  }

});
</script>

</body>
</html>
