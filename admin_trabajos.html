<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajos - Panel de Administración</title>
<link rel="stylesheet" href="style.css">
<style>
/* Estilos básicos del admin (similares a los otros admin_*.html) */
body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin:0; padding:0; }
.admin-container { display: flex; min-height: 100vh; }
.admin-menu { background-color: #222; color: #fff; width: 220px; flex-shrink: 0; padding: 20px; }
.admin-menu h3 { margin-bottom: 15px; }
.admin-menu ul { list-style: none; padding: 0; }
.admin-menu li { margin: 10px 0; }
.admin-menu a { color: #fff; text-decoration: none; font-weight: bold; display: block; padding: 8px 0; }
.admin-menu a:hover, .admin-menu a.active { color: #ad0000; }
.admin-content { flex: 1; padding: 20px; }

button, .btn-action { /* Estilos para botones de acción si los necesitas */
    background-color: #ad0000; color: white; padding: 8px 12px; border: none;
    border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; margin-right: 5px;
}
button:hover, .btn-action:hover { background-color: #ff0000; }

#lista-trabajos div > div { /* Estilo para cada item de trabajo */
    background-color: #1e1e1e; border: 1px solid #383838; padding: 15px; 
    margin-bottom: 15px; border-radius: 5px; 
}
#lista-trabajos h5 { color: #5cb85c; margin-top:0; } /* Verde para trabajos */
#lista-trabajos h5.completado { color: gray; } /* Gris para trabajos completados */

header { background-color: #000; color: #ad0000; padding: 20px; text-align: center; }
footer { background-color: #000; color: #ad0000; text-align: center; padding: 15px; border-top: 1px solid #333;}
</style>
</head>
<body>

<header>
  <h1 style="color:#ad0000;">Panel de Administración</h1>
</header>

<div class="admin-container">
  <aside class="admin-menu">
    <h3>Menú</h3>
    <ul>
      <li><a href="admin_vehiculos.html">Vehículos</a></li> 
      <li><a href="admin_presupuestos.html">Presupuestos</a></li>
      <li><a href="admin_trabajos.html" class="active">Trabajos</a></li> <li><a href="admin_manuales.html">Manuales</a></li>
      <li><a href="index.html">Volver a Inicio</a></li>
    </ul>
  </aside>

  <main class="admin-content">
    <section id="trabajos-section"> 
      <h2>Gestión de Trabajos</h2>
      <p>Aquí puedes ver los trabajos aceptados y su estado.</p>
      
      <div id="lista-trabajos">
           <p>Cargando trabajos...</p>
       </div>
    </section>
  </main>
</div>

<footer>
  <p>&copy; 2025 Taller Automotriz EDC. Todos los derechos reservados.</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/11.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.0/firebase-auth-compat.js"></script>
<script src="script.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof db === 'undefined') {
    console.error("Firebase (db) no está inicializado. Verifica script.js.");
    alert("Error crítico: No se pudo conectar a la base de datos.");
    return;
  }

  // --- Elementos DOM para Trabajos ---
  const listaTrabajosDiv = document.getElementById('lista-trabajos');
  // const filtroEstadoTrabajoSelect = document.getElementById('filtro-estado-trabajo'); // Para futuros filtros

  // --- Funciones para Trabajos ---
  async function mostrarTrabajos(filtroEstado = "todos") {
      if (!listaTrabajosDiv) return;
      listaTrabajosDiv.innerHTML = '<p>Cargando trabajos...</p>';
      try {
          let query = db.collection("trabajos_en_curso");

          if (filtroEstado !== "todos") {
              query = query.where("estadoTrabajo", "==", filtroEstado);
          }
          // Puedes añadir más orderBy si es necesario, por ejemplo, por fecha de inicio
          query = query.orderBy("fechaInicioTrabajo", "desc");

          const snapshot = await query.get();

          if (snapshot.empty) {
              listaTrabajosDiv.innerHTML = `<p>No hay trabajos ${filtroEstado !== "todos" ? `con estado '${filtroEstado}'` : ''} registrados.</p>`; 
              return;
          }
          let trabajosHTML = "";
          snapshot.forEach(doc => {
              const t = doc.data(); 
              const id = doc.id; // ID del documento del trabajo

              let manoDeObraTrabajoHTML = '';
              if (t.manoDeObra && t.manoDeObra.monto > 0) {
                  manoDeObraTrabajoHTML = `<li style="color: #ffc107;">Mano de Obra (${t.manoDeObra.descripcion || 'General'}): $${t.manoDeObra.monto.toFixed(2)}</li>`;
              }
              
              // Determinar el color del título basado en el estado
              let tituloColor = '#5cb85c'; // Verde para Pendiente/En Proceso
              if (t.estadoTrabajo === 'Completado') {
                  tituloColor = 'gray';
              } else if (t.estadoTrabajo === 'Cancelado') {
                  tituloColor = '#dc3545'; // Rojo para Cancelado
              }


              trabajosHTML += `
                  <div style="border: 1px solid ${t.estadoTrabajo === 'Completado' ? 'gray' : t.estadoTrabajo === 'Cancelado' ? '#721c24' :'#5cb85c'}; margin: 15px 0; padding: 15px; border-radius: 5px; background-color: #1e1e1e;">
                      <h5 style="margin-top:0; color: ${tituloColor};">Trabajo: ${t.vehiculoInfo || 'N/A'} (ID: ${id.substring(0,8)})</h5>
                      <p><strong>Cliente:</strong> ${t.clienteNombre || 'N/A'} ${t.clienteTelefono ? `- Tel: ${t.clienteTelefono}`: ''}</p>
                      <p><strong>Estado Actual del Trabajo:</strong> <span style="font-weight:bold; color:${tituloColor};">${t.estadoTrabajo || 'Pendiente'}</span></p>
                      <p><strong>Total Presupuestado:</strong> $${t.total ? t.total.toFixed(2) : '0.00'}</p>
                      <p><strong>ID Presupuesto Original:</strong> ${t.presupuestoOriginalId || 'N/A'}</p>
                      <p><strong>Items del Presupuesto:</strong></p>
                      <ul style="padding-left: 20px; margin-bottom: 10px;">
                          ${t.items && t.items.length > 0 ? t.items.map(item => `<li>${item.repuesto}: $${item.monto ? item.monto.toFixed(2) : '0.00'}</li>`).join('') : '<li>No hay items detallados.</li>'}
                          ${manoDeObraTrabajoHTML}
                      </ul>
                      <p style="font-size: 0.8em; color: #888;">Presupuesto Aceptado el: ${t.fechaAceptacionPresupuesto ? new Date(t.fechaAceptacionPresupuesto.seconds * 1000).toLocaleString() : 'N/A'}</p>
                      <p style="font-size: 0.8em; color: #888;">Trabajo Iniciado el: ${t.fechaInicioTrabajo ? new Date(t.fechaInicioTrabajo.seconds * 1000).toLocaleString() : 'N/A'}</p>
                      
                      <div style="margin-top: 10px;">
                          <label for="estado-trabajo-${id}">Cambiar Estado:</label>
                          <select id="estado-trabajo-${id}" data-trabajo-id="${id}" class="cambiar-estado-trabajo-select" style="margin-bottom:10px; width:auto; padding: 8px;">
                              <option value="Pendiente" ${t.estadoTrabajo === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                              <option value="En Proceso" ${t.estadoTrabajo === 'En Proceso' ? 'selected' : ''}>En Proceso</option>
                              <option value="Completado" ${t.estadoTrabajo === 'Completado' ? 'selected' : ''}>Completado</option>
                              <option value="Cancelado" ${t.estadoTrabajo === 'Cancelado' ? 'selected' : ''}>Cancelado</option>
                          </select>
                          </div>
                  </div>`;
          });
          listaTrabajosDiv.innerHTML = trabajosHTML;

          // Añadir event listeners a los nuevos selects para cambiar estado
          listaTrabajosDiv.querySelectorAll('.cambiar-estado-trabajo-select').forEach(select => {
              select.addEventListener('change', async (e) => {
                  const trabajoId = e.target.dataset.trabajoId;
                  const nuevoEstado = e.target.value;
                  await actualizarEstadoTrabajo(trabajoId, nuevoEstado);
              });
          });

      } catch (error) { 
          console.error("Error al mostrar trabajos:", error);
          if(listaTrabajosDiv) listaTrabajosDiv.innerHTML = "<p style='color:red;'>Error al cargar los trabajos.</p>";
      }
  }

  async function actualizarEstadoTrabajo(trabajoId, nuevoEstado) {
      if (!trabajoId || !nuevoEstado) {
          alert("Faltan datos para actualizar el estado del trabajo.");
          return;
      }
      try {
          const trabajoRef = db.collection("trabajos_en_curso").doc(trabajoId);
          let datosActualizar = { estadoTrabajo: nuevoEstado };
          
          if (nuevoEstado === 'Completado') {
              datosActualizar.fechaCompletado = firebase.firestore.FieldValue.serverTimestamp();
          } else if (nuevoEstado === 'Cancelado') {
              datosActualizar.fechaCancelado = firebase.firestore.FieldValue.serverTimestamp();
          }
          // Podrías querer quitar fechas si se cambia de Completado/Cancelado a otro estado
          // Ejemplo: si se cambia de Completado a En Proceso, quitar fechaCompletado
          // else {
          //    datosActualizar.fechaCompletado = firebase.firestore.FieldValue.delete();
          //    datosActualizar.fechaCancelado = firebase.firestore.FieldValue.delete();
          // }


          await trabajoRef.update(datosActualizar);
          alert(`Estado del trabajo ID ${trabajoId.substring(0,8)} actualizado a: ${nuevoEstado}`);
          mostrarTrabajos(); // Refrescar la lista para ver el cambio
      } catch (error) {
          console.error("Error al actualizar estado del trabajo:", error);
          alert("Error al actualizar el estado: " + error.message);
      }
  }

  // --- Event Listeners (si se añaden filtros) ---
  // if (filtroEstadoTrabajoSelect) {
  //     filtroEstadoTrabajoSelect.addEventListener('change', (e) => {
  //         mostrarTrabajos(e.target.value);
  //     });
  // }


  // --- Carga Inicial ---
  if (typeof mostrarTrabajos === "function") {
    mostrarTrabajos(); // Mostrar todos los trabajos al inicio
  } else {
    console.error("La función mostrarTrabajos no está definida al cargar la página.");
  }

});
</script>

</body>
</html>
